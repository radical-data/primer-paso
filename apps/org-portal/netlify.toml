[build]
	command = "node scripts/check-org-portal-env.mjs --strict && node scripts/check-db-runtime.mjs --strict && pnpm --filter @primer-paso/org-portal build"
	publish = "build"

[build.environment]
	NODE_VERSION = "24.10.0"

[context.deploy-preview.environment]
	PRIVATE_ORG_PORTAL_ENVIRONMENT = "preview"

[context.production.environment]
	PRIVATE_ORG_PORTAL_ENVIRONMENT = "production"