[build]
	base = "apps/public"
	command = "node ../../scripts/check-matomo-env.mjs --strict && node ../../scripts/check-db-runtime.mjs --strict && pnpm build"
	publish = "build"

[build.environment]
	NODE_VERSION = "24.10.0"
	PUBLIC_CERTIFICATE_HANDOFF_ENABLED = "false"
	PUBLIC_ORG_PORTAL_URL = "https://org.primerpaso.org"

[context.production.environment]
	PUBLIC_CERTIFICATE_HANDOFF_ENABLED = "true"
	PUBLIC_ORG_PORTAL_URL = "https://org.primerpaso.org"

[context.deploy-preview.environment]
	PUBLIC_CERTIFICATE_HANDOFF_ENABLED = "false"
	PUBLIC_ORG_PORTAL_URL = "https://org.primerpaso.org"
