version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    groups:
      sveltekit-stack:
        patterns:
          - "@sveltejs/*"
          - "svelte"
          - "vite"
          - "vitest"
      supabase:
        patterns:
          - "@supabase/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
