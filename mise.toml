[tools]
pnpm = "10.33.0"
just = "latest"

[settings]
idiomatic_version_file_enable_tools = ["node"]
experimental = true

[tasks."analytics:env:check"]
description = "Validate the Matomo public environment contract"
run = "node --env-file-if-exists=.env scripts/check-matomo-env.mjs"

[tasks."analytics:env:check:strict"]
description = "Validate the Matomo public environment contract and fail on missing or invalid values"
run = "node --env-file-if-exists=.env scripts/check-matomo-env.mjs --strict"

[tasks."org:env:check"]
description = "Validate the organisation portal environment contract"
run = "node --env-file-if-exists=.env scripts/check-org-portal-env.mjs"

[tasks."org:env:check:strict"]
description = "Validate the organisation portal environment contract and fail on missing or invalid values"
run = "node --env-file-if-exists=.env scripts/check-org-portal-env.mjs --strict"

[tasks."dev:public"]
description = "Run the public Primer Paso app"
run = "pnpm --filter @primer-paso/public dev"

[tasks."dev:org"]
description = "Run the organisation portal app"
run = "pnpm --filter @primer-paso/org-portal dev"

[tasks."build:public"]
description = "Build the public Primer Paso app"
run = "pnpm --filter @primer-paso/public build"

[tasks."build:org"]
description = "Build the organisation portal app"
run = "pnpm --filter @primer-paso/org-portal build"

[tasks."db:migrate"]
description = "Apply database migrations"
run = "pnpm --filter @primer-paso/db migrate"
